<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - BanGuide</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header class="page-header">
    <h1 class="page-header-title">You are offline</h1>
    <p class="page-header-subtitle">This page has not been cached yet.</p>
  </header>

  <main class="page">
    <section class="error-state" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
      <h2 class="error-heading" style="color: var(--color-text);">Reconnect to continue</h2>
      <p>Reconnect to the internet and revisit this page once to store it for offline use.</p>
      <p style="margin-top: var(--space-sm);">Previously visited pages should still work while offline.</p>
      <p style="margin-top: var(--space-lg);"><a href="index.html" class="back-nav" style="margin: 0;">Back to courses</a></p>
    </section>
  </main>
</body>
</html>
